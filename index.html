<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Phaxs Clicker</title>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
}

#adminPanel {
    position: fixed;
    top: 10px;
    right: 10px;
    width: 280px;
    max-height: 90vh;
    overflow-y: auto;
    background: #1e1e1e;
    border: 2px solid #00ff99;
    padding: 10px;
    display: none; /* 🔒 CLOSED BY DEFAULT */
    z-index: 9999;
}

#adminPanel button {
    width: 100%;
    margin: 4px 0;
    padding: 6px;
    background: #333;
    color: white;
    border: 1px solid #555;
    cursor: pointer;
}

#adminPanel button:hover {
    background: #444;
}

#adminPanel input {
    width: 100%;
    margin: 4px 0;
    padding: 5px;
}
</style>
</head>

<body>

<h1>Phaxs Clicker</h1>

<div id="content"></div>

<!-- ADMIN PANEL -->
<div id="adminPanel">

<h3>Admin Panel</h3>

<!-- ✅ PUBLIC RESET -->
<button onclick="resetAll()">RESET ALL (Public)</button>

<hr>

<!-- 🔒 LOCKED SECTION -->
<input type="password" id="adminCodeInput" placeholder="Enter Code">
<button onclick="unlockAdmin()">Unlock Admin</button>

<div id="adminControls" style="display: none;">

<button onclick="addMoney(1000)">+1K</button>
<button onclick="addMoney(100000)">+100K</button>

<button onclick="toggleInfiniteMoney()">Infinite Money</button>

<button onclick="setClickMultiplier(10)">Click x10</button>
<button onclick="setClickMultiplier(100)">Click x100</button>

<button onclick="toggleOPAutoClicker()">OP AutoClicker</button>

</div>

</div>

<script src="bundle.js"></script>
<script src="admin.js"></script>

<script>
document.addEventListener("keydown", function(e){
    if(e.key === "`"){
        const panel = document.getElementById("adminPanel");
        panel.style.display = panel.style.display === "block" ? "none" : "block";
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
  <title>Phaxs Clicker Game</title>
  <style>
  body {
    background: linear-gradient(135deg, #1f1f1f, #121212);
    font-family: Arial, sans-serif;
  }

  button {
    background: #ff9800;
    border: none;
    padding: 8px;
    margin: 4px 0;
    color: white;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover {
    background: #ff5722;
  }
  </style>
</head>

  <!-- ADMIN PANEL -->
<div id="adminPanel" style="
display:none;
position:fixed;
top:20px;
right:20px;
background:#1e1e1e;
color:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
z-index:9999;
width:280px;
font-family:Arial;
">

<h3>Admin Panel</h3>

<input id="adminCodeInput" placeholder="Enter Secret Code"
style="width:100%;padding:6px;margin-bottom:8px;border-radius:6px;border:none;">

<button onclick="unlockAdmin()" style="width:100%;">Unlock</button>

<div id="adminControls" style="display:none;margin-top:12px;">

<button onclick="setMoney(1000000)">Set 1M Money</button>
<button onclick="addMoney(50000)">Add 50K</button>
<button onclick="toggleInfiniteMoney()">Infinite Money</button>
<button onclick="setClickMultiplier(2)">Click x2</button>
<button onclick="setClickMultiplier(10)">Click x10</button>
<button onclick="setClickMultiplier(100)">Click x100</button>
<button onclick="toggleOPAutoClicker()">OP AutoClicker</button>
<button onclick="boostProduction()">Production x100</button>

</div>
</div>

<script src="bundle.js"></script>
<script src="admin.js"></script>

<body>
  <div id="content"></div>
  <script src="bundle.js"></script>

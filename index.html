<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Phaxs Clicker Game</title>
    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        #adminPanel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #222;
            padding: 15px;
            border: 2px solid red;
            display: none;
            z-index: 9999;
            width: 250px;
        }

        #adminPanel input {
            width: 100%;
            margin-bottom: 5px;
        }

        #adminPanel button {
            width: 100%;
            margin-bottom: 5px;
            cursor: pointer;
        }

        #adminControls {
            display: none;
        }
    </style>
</head>

<body>

<h1>Phaxs Clicker</h1>
<div id="content"></div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
    <h3>Admin Panel</h3>

    <input type="password" id="adminCodeInput" placeholder="Enter Code">
    <button onclick="unlockAdmin()">Unlock</button>

    <div id="adminControls">
        <hr>

        <button onclick="addMoney(1000)">+1,000 Clicks</button>
        <button onclick="addMoney(100000)">+100,000 Clicks</button>

        <button onclick="setMoney(0)">Reset Clicks</button>

        <button onclick="toggleInfiniteMoney()">Toggle Infinite</button>

        <button onclick="setClickMultiplier(10)">Click x10</button>
        <button onclick="setClickMultiplier(100)">Click x100</button>

        <button onclick="toggleOPAutoClicker()">OP AutoClicker</button>

        <button onclick="boostProduction()">Boost Production</button>
    </div>
</div>

<!-- IMPORTANT: Load bundle ONCE -->
<script src="bundle.js"></script>
<script src="admin.js"></script>

</body>
</html>
